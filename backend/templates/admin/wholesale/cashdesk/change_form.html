{% extends "admin/change_form.html" %}

{% block object-tools %}
{{ block.super }}

{% if original and original.id %}
<li>
  <a href="#" id="openDepositModal" class="button default">
    💰 Внести гривну
  </a>
</li>
{% endif %}

{% endblock %}


{% block extrahead %}
{{ block.super }}

{% if original and original.id %}
<script>
document.addEventListener("DOMContentLoaded", function () {

  const button = document.getElementById("openDepositModal");

  if (!button) return;

  button.addEventListener("click", function (e) {

    e.preventDefault();

    fetch("{% url 'admin:wholesale_cashdesk_deposit_modal' original.id %}")
      .then(r => r.json())
      .then(data => {

        if (data.html) {
          const modalWrapper = document.createElement("div");
          modalWrapper.innerHTML = data.html;
          document.body.appendChild(modalWrapper);
        }

      });

  });

});
</script>
{% endif %}

{% endblock %}
