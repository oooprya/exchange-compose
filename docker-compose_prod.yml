networks:
  dev:

services:
  nginx:
    build: ./nginx
    image: v1.01
    volumes:
      - static_volume:/static
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt  # Пробрасываем SSL-сертификаты внутрь контейнера
      - ./nginx/robots.txt:/etc/nginx/robots.txt  # Пробрасываем robots.txt внутрь контейнера
    ports:
      - "8081:80"
      - "443:443"
    restart: always
    depends_on:
      - backend
    networks:
      - dev

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: api
    image: api_v1.001
    volumes:
      - static_volume:/app/staticfiles
    env_file:
      - ./.env.prod
    restart: always
    depends_on:
      - db
      - redis
    networks:
      - dev
  db:
    image: postgres:16
    restart: always
    volumes:
      - pgdata16:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: django_db
      POSTGRES_USER: django_user
      POSTGRES_PASSWORD: django_password
    ports:
      - 5432:5432
    networks:
      - dev


  frontend:
    build: ./frontend
    image: next_v1.0005
    ports:
      - 4000:3000
    environment:
      - TZ=Europe/Kiev
    restart: always
    depends_on:
      - nginx
    networks:
      - dev

  telegram_bot:
    image: bot_v1.0003
    build: ./bot
    container_name: telegram_bot
    volumes:
      - ./bot:/app
    restart: unless-stopped
    depends_on:
      - backend
      - db
    env_file:
      - ./.env.prod

  admin:
    image: adminer
    restart: always
    depends_on:
      - db
    ports:
      - 8080:8080
    networks:
      - dev

  redis:
    image: redis:7.0.5-alpine
    ports:
      - "6379:6379"
    volumes:
      - ./redis.conf:/etc/redis/redis.conf
    command: ["redis-server", "/etc/redis/redis.conf"]
    restart: unless-stopped
    networks:
      - dev


volumes:
  static_volume:
  pgdata16: