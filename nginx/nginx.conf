map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name exprivat.com.ua www.exprivat.com.ua;

    # Доступ к папке для Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    # Редирект всего остального на https
    location / {
        return 301 https://$host$request_uri;
    }

    

}

server {
    listen 443 ssl;
    http2 on;
    server_name  exprivat.com.ua www.exprivat.com.ua;

    ssl_certificate /etc/letsencrypt/live/exprivat.com.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/exprivat.com.ua/privkey.pem;

    

    ###################################
    # Защита от таймаутов upstream
    ###################################
    proxy_connect_timeout 60;
    proxy_send_timeout 120;
    proxy_read_timeout 120;
    send_timeout 120;


    ###################################
    # GZIP (включить при необходимости)
    ###################################
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss application/xml image/svg+xml;
    gzip_min_length 1000;

    location /ws/ {

        proxy_pass http://backend:8000;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme; 

        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }


    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Отдавать sitemap.xml
    location /sitemap.xml {
        proxy_pass http://backend:8000;
        access_log off;
        add_header Content-Type "application/xml";
    }

    location /api/v1/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/pwa/ {
    alias /static/pwa/;
    }

    location = /manifest.json {
        add_header Content-Type application/json;
    }

    # Static
    location /static/ {
        alias /static/;
        access_log off;
        expires 30d;
    }

    # Раздача robots.txt
    location = /robots.txt {
        root /etc/nginx/;
    }

    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

}